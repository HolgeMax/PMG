defaults:
  - model@data_loader: data_loader
  - model@model: model
  - model@train: train
  - _self_

evaluate:
  checkpoint_dir: results/checkpoints   # directory to scan (recursive) for *.pt files
  only_best: true                        # if false, also evaluate _final.pt checkpoints
  output_dir: results/metrics/evaluate   # where to write evaluation_summary.csv

hydra:
  run:
    dir: results/evaluate/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: results/evaluate/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
