# Training configuration for PMG classification.
# Accessible in code as cfg.train.*
#
# device options: cuda, cpu, mps

batch_size: 32
num_epochs: 20
learning_rate: 5.0e-4
weight_decay: 1.0e-3
num_workers: 4
device: cuda
is_training: true
val_frac: 0.2
test_frac: 0.2
seed: 42
output_dir: results   # base output directory for checkpoints and metrics
