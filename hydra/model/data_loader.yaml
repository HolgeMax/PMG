# DataLoader configuration for PMG classification.
# Accessible in code as cfg.data_loader.*
#
# pmg_negative_mode options:
#   "correct" — label=2 → HC, label=3 excluded   (methodologically correct)
#   "paper"   — label=2 and label=3 → PMG        (replicates Guha & Bhandage 2025)

data_dir: data/PPMR_default     # preprocessed data
raw_data_dir: data/PPMR         # original PPMR data 
train_raw: false                 # set to true to train directly on raw data
crop_size: 224
scale: [0.8, 1.0]
mean: [0.485, 0.456, 0.406]  # ImageNet stats — required for pretrained backbone
std: [0.229, 0.224, 0.225]
pmg_negative_mode: correct
augment: true                # set to false to disable training-time augmentation
# balance_mode options:
#   null          — no balancing (default)
#   "pre_split"   — undersample HC before split (replicates Guha & Bhandage 2025, incorrect)
#   "post_split"  — undersample HC in train split only after split (correct)
balance_mode: null
