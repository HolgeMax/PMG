preprocessing:
  convert_to_grayscale: true
  normalization:
    method: min_max
    output_range:
    - 0.0
    - 1.0
  clahe:
    clip_limit: 1.5
    tile_grid_size:
    - 8
    - 8
  bilateral:
    diameter: 2
    sigma_color: 25.0
    sigma_space: 25.0
  canny:
    low_threshold: 50
    high_threshold: 200
    aperture_size: 3
    blend_alpha: 0.05
input_path: data/PPMR
slice_idx: null
recursive: true
