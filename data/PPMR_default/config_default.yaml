preprocessing:
  convert_to_grayscale: true
  normalization:
    method: min_max
    output_range:
    - 0.0
    - 1.0
  clahe:
    clip_limit: 2.0
    tile_grid_size:
    - 8
    - 8
  bilateral:
    diameter: 9
    sigma_color: 75.0
    sigma_space: 75.0
  canny:
    low_threshold: 50
    high_threshold: 200
    aperture_size: 3
    blend_alpha: 0.2
input_path: data/PPMR
output_path: data/PPMR_default
slice_idx: null
recursive: true
